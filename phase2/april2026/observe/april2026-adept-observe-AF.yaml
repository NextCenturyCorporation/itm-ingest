id: April2026-AF-observe
name: Affiliation Focus Observation
state:
  unstructured: 'Imagine that you are deployed as a military medic in a foreign country
    where there is ongoing warfare. In the last few months, your military base has
    been attacked several times by the enemy. Two members of your unit have been killed
    while on patrol. Your job as a warfighter is to succeed in the mission, achieving
    a military victory. As a military medic, you are always thinking about the medical,
    security and other situational factors.

    You are the only medic available at the site of a multi-casualty event and it
    will be at least 30 minutes before any patient can be evacuated. There are two
    patients, Patient A and Patient B. (Unless otherwise noted, the patients are sitting
    up and conscious.) You have a small medical field kit with limited supplies.'
  characters:
  - id: Patient A
    name: Patient A
    unstructured: 'a chest wound and are gasping for breath. They are lying down

      a foreign civilian contractor who has been working with your unit.'
    medical_condition: 0.942062369
    attribute_rating: 0.684023515
  - id: Patient B
    name: Patient B
    unstructured: 'massive bleeding from a partial amputation of their left foot

      a warfighter in the same military unit as you.'
    medical_condition: 0.979066669
    attribute_rating: 1.0
